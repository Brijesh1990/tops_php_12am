<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Append Table Row Using Loop</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        table{
            border-collapse: collapse;
            width: 60%;
            margin-top: 20px;
        }

        table, th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="addRow">Add Rows</button>

    <table id="studentTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
            </tr>
        </thead>

        <tbody>
        </tbody>
    </table>

    <script>

        $(document).ready(function(){

            $("#addRow").click(function(){

                // for loop
                for(let i = 1; i <= 50; i++){

                    $("#studentTable tbody").append(`
                        <tr>
                            <td>${i}</td>
                            <td>Student ${i}</td>
                            <td>MERN Stack</td>
                        </tr>
                    `);

                }

            });

        });

    </script>

</body>
</html>
