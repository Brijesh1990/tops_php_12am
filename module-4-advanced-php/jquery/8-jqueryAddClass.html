<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<script src="js/jquery.min.js"></script>
<script>
$(document).ready(function(){  
    $("#btn").click(function(){
        $("div").addClass("app");
        $("button").addClass("button");
    })
})    
</script>
<style>
.app 
{
width: 40%;
height: auto;
margin: auto;
padding: 25px;
margin-top: 5%;    
background-color: blue;
color: white;
transition: 2s ease all;
}    
.button
{
width: 40%;    
margin: auto;
margin-left: 30%;
border: none;
background-color: blue;
color: white;
margin-top: 2%;    
}
</style>
</head>
<body>

<div>
<h1>About us</h1>

</div>

<button type="button" id="btn">Add Class</button>

</html>
