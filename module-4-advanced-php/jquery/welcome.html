<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Contact Form</title>

  <!-- Tailwind CSS 4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <!-- Main Container -->
  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl overflow-hidden">


    <!-- Welcome Page -->
    <div
      id="welcomePage"
      class=" flex flex-col items-center justify-center text-center p-16 bg-gradient-to-r from-blue-600 to-indigo-700 text-white min-h-[600px]"
    >

      <!-- Animated Circle -->
      <div class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center animate-bounce mb-8">
        <span class="text-6xl">🎉</span>
      </div>

      <!-- Welcome Text -->
      <h1
        id="welcomeText"
        class="text-5xl md:text-6xl font-bold mb-6 animate-pulse"
      >
        Welcome
      </h1>

      <p class="text-xl md:text-2xl mb-8 max-w-2xl leading-9">
        Your form has been submitted successfully.
        Thank you for contacting us.
      </p>

      <!-- Animated Button -->
      <button
        onclick="goBack()"
        class="bg-white text-blue-700 px-8 py-4 rounded-full font-bold text-lg hover:scale-110 transition duration-300 shadow-xl"
      >
        Back To Form
      </button>

    </div>

  </div>


</body>
</html>
