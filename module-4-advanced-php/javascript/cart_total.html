<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Shopping Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel='stylesheet' href='css/style.css'>
<script src="js/main.js"></script>
</head>
<body onload="mainFunction()">
<div id="loader"></div>    
<div id="mainPage">    
<div class="container mt-5">
<h1>Shopping Cart</h1>
<table width="60%" class="table table-striped">
<thead>
<tr>
<th>Photo</th>
<th>Select Qty</th>
<th>Price</th>
</tr>
</thead>
<tbody>
<tr>
<td><img src="https://m.media-amazon.com/images/I/719uGTxwMWL._SY575_.jpg" alt="Product 2" class="img-fluid w-25"></td>
<td><input type="number" id="qty" min="1" max="10" value="1" onchange="subTotal()" /></td>
<td>Rs.<input type="text" id="price" value="25" style="border: 0; background-color: transparent;" /></td>
</tr>
<tr>
<td colspan="3" align="right">Subtotal of Products : Rs. <label id="tot">25</label> -/</td>
</tr>
</tbody>
</table>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
