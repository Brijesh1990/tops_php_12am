<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Scientific Calculator UI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css" />

    <script src="js/main.js"></script>
</head>
<body>

    <div class="calculator">

        <!-- Display -->
        <input type="text" class="display" placeholder="0">

        <!-- Buttons -->
        <table>
            <tr>
                <td><button class="btn-calc function">sin</button></td>
                <td><button class="btn-calc function">cos</button></td>
                <td><button class="btn-calc function">tan</button></td>
                <td><button class="btn-calc operator">⌫</button></td>
            </tr>

            <tr>
                <td><button class="btn-calc function">log</button></td>
                <td><button class="btn-calc function">ln</button></td>
                <td><button class="btn-calc function">√</button></td>
                <td><button class="btn-calc operator">/</button></td>
            </tr>

            <tr>
                <td><button class="btn-calc">7</button></td>
                <td><button class="btn-calc">8</button></td>
                <td><button class="btn-calc">9</button></td>
                <td><button class="btn-calc operator">*</button></td>
            </tr>

            <tr>
                <td><button class="btn-calc">4</button></td>
                <td><button class="btn-calc">5</button></td>
                <td><button class="btn-calc">6</button></td>
                <td><button class="btn-calc operator">-</button></td>
            </tr>

            <tr>
                <td><button class="btn-calc">1</button></td>
                <td><button class="btn-calc">2</button></td>
                <td><button class="btn-calc">3</button></td>
                <td><button class="btn-calc operator">+</button></td>
            </tr>

            <tr>
                <td><button class="btn-calc">00</button></td>
                <td><button class="btn-calc">0</button></td>
                <td><button class="btn-calc">.</button></td>
                <td><button class="btn-calc equal">=</button></td>
            </tr>
        </table>

    </div>

</body>
</html>
