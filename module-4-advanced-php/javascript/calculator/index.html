<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scientific Calculator UI</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css" />

<script src="js/main.js"></script>
</head>
<body>
<div class="calculator"  oncontextmenu="return false;">
<!-- Display -->
<input type="text" class="display" id="result" placeholder="0">
<!-- Buttons -->
<table>
<tr>
<td><button class="btn-calc function">sin</button></td>
<td><button class="btn-calc function">cos</button></td>
<td><button class="btn-calc function" onclick="clrButton()">C</button></td>
<td><button class="btn-calc operator" onclick="slcData()">⌫</button></td>
</tr>
<tr>
<td><button class="btn-calc function">log</button></td>
<td><button class="btn-calc function" onclick="SQ()">x²</button></td>
<td><button class="btn-calc function" onclick="SQRT()">√x</button></td>
<td><button class="btn-calc operator" value="/" onclick="return inpValue(this.value)">/</button></td>
</tr>

<tr>
<td><button class="btn-calc" value="7" onclick="return inpValue(this.value)">7</button></td>
<td><button class="btn-calc" value="8" onclick="return inpValue(this.value)">8</button></td>
<td><button class="btn-calc" value="9" onclick="return inpValue(this.value)">9</button></td>
<td><button class="btn-calc operator" value="*" onclick="return inpValue(this.value)">*</button></td>
</tr>

<tr>
<td><button class="btn-calc" value="4" onclick="return inpValue(this.value)">4</button></td>
<td><button class="btn-calc" value="5" onclick="return inpValue(this.value)">5</button></td>
<td><button class="btn-calc" value="6" onclick="return inpValue(this.value)">6</button></td>
<td><button class="btn-calc operator" value="-" onclick="return inpValue(this.value)">-</button></td>
</tr>

<tr>
<td><button class="btn-calc" value="1" onclick="return inpValue(this.value)">1</button></td>
<td><button class="btn-calc" value="2" onclick="return inpValue(this.value)">2</button></td>
<td><button class="btn-calc" value="3" onclick="return inpValue(this.value)">3</button></td>
<td><button class="btn-calc operator" value="+" onclick="return inpValue(this.value)">+</button></td>
</tr>

<tr>
<td><button class="btn-calc" value="00" onclick="return inpValue(this.value)">00</button></td>
<td><button class="btn-calc" value="0" onclick="return inpValue(this.value)">0</button></td>
<td><button class="btn-calc" value="." onclick="return inpValue(this.value)">.</button></td>
<td><button class="btn-calc equal" onclick="finalResult()">=</button></td>
</tr>
</table>

</div>

</body>
</html>
