<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Panda Login</title>

<style>

/* ---------- GLOBAL ---------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Poppins", sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

/* ---------- CARD ---------- */

.card{
width:400px;
max-width:95%;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 15px 50px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

/* ---------- PANDA ---------- */

.panda{
position:relative;
width:160px;
height:140px;
margin:0 auto 25px;
}

.face{
width:140px;
height:120px;
background:white;
border-radius:50%;
margin:auto;
position:relative;
box-shadow:inset 0 -6px rgba(0,0,0,0.05);
}

/* ears */

.ear{
width:50px;
height:50px;
background:black;
border-radius:50%;
position:absolute;
top:-10px;
}

.ear.left{ left:-10px; }
.ear.right{ right:-10px; }

/* eyes */

.eye{
width:40px;
height:40px;
background:black;
border-radius:50%;
position:absolute;
top:35px;
display:flex;
align-items:center;
justify-content:center;
}

.eye.left{ left:25px; }
.eye.right{ right:25px; }

.eyeball{
width:20px;
height:20px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.pupil{
width:8px;
height:8px;
background:black;
border-radius:50%;
transition:.1s;
}

/* nose */

.nose{
width:20px;
height:15px;
background:black;
border-radius:50%;
position:absolute;
left:50%;
transform:translateX(-50%);
top:70px;
}

/* hands */

.hand{
width:50px;
height:50px;
background:white;
border-radius:50%;
position:absolute;
top:60px;
transition:.4s;
}

.hand.left{ left:-30px; }
.hand.right{ right:-30px; }

.cover .left{
transform:translateY(-35px) rotate(20deg);
}

.cover .right{
transform:translateY(-35px) rotate(-20deg);
}

/* ---------- FORM ---------- */

.form{
display:none;
flex-direction:column;
gap:15px;
}

.form.active{
display:flex;
}

input{
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1f2937;
color:white;
}

button{
padding:12px;
border-radius:10px;
border:none;
background:#4ade80;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#22c55e;
}

/* ---------- SWITCH ---------- */

.switch{
margin-top:15px;
font-size:14px;
color:#ccc;
}

.switch span{
color:#4ade80;
cursor:pointer;
}

/* ---------- RESPONSIVE ---------- */

@media(max-width:480px){

.card{
padding:25px;
}

}

</style>
</head>

<body>

<div class="card">

<!-- PANDA -->

<div class="panda" id="panda">

<div class="ear left"></div>
<div class="ear right"></div>

<div class="face">

<div class="eye left">
<div class="eyeball">
<div class="pupil"></div>
</div>
</div>

<div class="eye right">
<div class="eyeball">
<div class="pupil"></div>
</div>
</div>

<div class="nose"></div>

</div>

<div class="hand left"></div>
<div class="hand right"></div>

</div>


<!-- LOGIN FORM -->

<div class="form active" id="login">

<input id="username" type="text" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button>Sign In</button>

<div class="switch">
No account? <span onclick="showSignup()">Sign Up</span>
</div>

</div>


<!-- SIGNUP FORM -->

<div class="form" id="signup">

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Create Account</button>

<div class="switch">
Already have account? <span onclick="showLogin()">Login</span>
</div>

</div>

</div>


<script>

/* ---------- FORM SWITCH ---------- */

function showSignup(){
document.getElementById("login").classList.remove("active")
document.getElementById("signup").classList.add("active")
}

function showLogin(){
document.getElementById("signup").classList.remove("active")
document.getElementById("login").classList.add("active")
}

/* ---------- EYE FOLLOW ---------- */

const pupils=document.querySelectorAll(".pupil")

document.addEventListener("mousemove",(e)=>{

pupils.forEach(pupil=>{

const rect=pupil.getBoundingClientRect()

const x=e.clientX-rect.left-rect.width/2
const y=e.clientY-rect.top-rect.height/2

const angle=Math.atan2(y,x)

const moveX=Math.cos(angle)*6
const moveY=Math.sin(angle)*6

pupil.style.transform=`translate(${moveX}px,${moveY}px)`

})

})

/* ---------- COVER EYES ---------- */

const panda=document.getElementById("panda")
const pass=document.getElementById("password")

pass.addEventListener("focus",()=>{
panda.classList.add("cover")
})

pass.addEventListener("blur",()=>{
panda.classList.remove("cover")
})

/* ---------- REACT TO USERNAME ---------- */

const user=document.getElementById("username")

user.addEventListener("input",()=>{

if(user.value.length>0){
panda.style.transform="rotate(5deg)"
}else{
panda.style.transform="rotate(0deg)"
}

})

</script>

</body>
</html>
