<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6">
    
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-center border-b pb-4">
      <div class="flex items-center gap-3">
        <img src="https://via.placeholder.com/60" alt="Logo" class="w-14 h-14 rounded">
        <div>
          <h1 class="text-xl font-bold">Your Company</h1>
          <p class="text-sm text-gray-500">company@email.com</p>
        </div>
      </div>

      <div class="mt-4 md:mt-0 text-right">
        <h2 class="text-2xl font-bold text-gray-800">INVOICE</h2>
        <p class="text-sm text-gray-500">#INV-001</p>
      </div>
    </div>

    <!-- Billing Info -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
      <div>
        <h3 class="font-semibold text-gray-700">Bill To:</h3>
        <p class="text-gray-600">John Doe</p>
        <p class="text-gray-600">123 Street Name</p>
        <p class="text-gray-600">City, Country</p>
      </div>

      <div class="text-left md:text-right">
        <p><span class="font-semibold">Invoice Date:</span> 15 Apr 2026</p>
        <p><span class="font-semibold">Due Date:</span> 30 Apr 2026</p>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto mt-6">
      <table class="w-full border border-gray-200 rounded-lg overflow-hidden">
        <thead class="bg-gray-100">
          <tr>
            <th class="text-left p-3 text-sm font-semibold">Item</th>
            <th class="text-center p-3 text-sm font-semibold">Qty</th>
            <th class="text-right p-3 text-sm font-semibold">Price</th>
            <th class="text-right p-3 text-sm font-semibold">Total</th>
          </tr>
        </thead>

        <tbody class="divide-y">
          <tr>
            <td class="p-3">Web Design</td>
            <td class="p-3 text-center">1</td>
            <td class="p-3 text-right">₹5000</td>
            <td class="p-3 text-right">₹5000</td>
          </tr>

          <tr>
            <td class="p-3">Hosting</td>
            <td class="p-3 text-center">1</td>
            <td class="p-3 text-right">₹2000</td>
            <td class="p-3 text-right">₹2000</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Summary -->
    <div class="flex justify-end mt-6">
      <div class="w-full md:w-1/3">
        <div class="flex justify-between py-2">
          <span class="text-gray-600">Subtotal</span>
          <span class="font-medium">₹7000</span>
        </div>

        <div class="flex justify-between py-2">
          <span class="text-gray-600">Tax (10%)</span>
          <span class="font-medium">₹700</span>
        </div>

        <div class="flex justify-between py-3 border-t text-lg font-bold">
          <span>Total</span>
          <span>₹7700</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-sm text-gray-500 border-t pt-4">
      Thank you for your business!
    </div>

  </div>

</body>
</html>
